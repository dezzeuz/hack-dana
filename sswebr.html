<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Recorder 🎥</title>
    <!-- Tailwind CSS untuk styling instan -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h1 class="text-3xl font-bold mb-2 text-center text-blue-400">Web Recorder 🎥</h1>
        <p class="text-sm text-gray-400 text-center mb-6">Ubah URL website apapun jadi video!</p>

        <form id="recordForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1 text-gray-300">URL Website</label>
                <input type="url" id="url" required placeholder="https://github.com" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none text-white transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Device</label>
                    <select id="device" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-blue-500 outline-none text-white transition-all">
                        <option value="desktop_fhd">Desktop FHD</option>
                        <option value="mobile">Mobile</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-gray-300">Durasi (ms)</label>
                    <input type="number" id="duration" value="8000" class="w-full p-3 rounded-lg bg-gray-900 border border-gray-600 focus:border-blue-500 outline-none text-white transition-all">
                </div>
            </div>

            <div class="flex items-center gap-6 pt-2">
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="scroll" checked class="w-5 h-5 rounded accent-blue-500 bg-gray-700">
                    <span class="text-sm text-gray-300">Auto Scroll</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" id="darkMode" class="w-5 h-5 rounded accent-blue-500 bg-gray-700">
                    <span class="text-sm text-gray-300">Dark Mode</span>
                </label>
            </div>

            <button type="submit" id="submitBtn" class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-all shadow-lg hover:shadow-blue-500/30">
                🔴 Mulai Record
            </button>
        </form>

        <!-- Indikator Loading -->
        <div id="loading" class="hidden mt-6 p-4 rounded-lg bg-gray-900 border border-gray-700 text-center animate-pulse">
            <span class="block text-blue-400 font-medium mb-1">Sedang merekam... ⏳</span>
            <span class="text-xs text-gray-400">Tunggu sebentar, ini memakan waktu beberapa detik.</span>
        </div>

        <!-- Hasil Video -->
        <div id="result" class="hidden mt-6">
            <h3 class="text-lg font-semibold mb-3 text-green-400">✅ Hasil Record:</h3>
            <video id="videoPlayer" controls autoplay loop class="w-full rounded-lg border border-gray-600 bg-black shadow-lg"></video>
            <a id="downloadBtn" href="#" download="website-record.mp4" class="block w-full text-center mt-4 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition-all shadow-lg hover:shadow-green-500/30">
                ⬇️ Download Video
            </a>
        </div>
    </div>

    <script>
        document.getElementById('recordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const videoPlayer = document.getElementById('videoPlayer');
            const downloadBtn = document.getElementById('downloadBtn');

            // Set state to loading
            btn.disabled = true;
            btn.classList.add('opacity-50', 'cursor-not-allowed');
            btn.innerText = 'Menyiapkan API...';
            loading.classList.remove('hidden');
            result.classList.add('hidden');

            const payload = {
                url: document.getElementById('url').value,
                device: document.getElementById('device').value,
                duration_ms: parseInt(document.getElementById('duration').value),
                fps: 30,
                scroll: document.getElementById('scroll').checked,
                dark_mode: document.getElementById('darkMode').checked,
                wait_ms: 1500
            };

            try {
                const response = await fetch('https://shinana-bentosnap.hf.space/api/record', {
                    method: 'POST',
                    headers: {
                        'accept': 'application/json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Gagal menghubungi API');

                // Karena kita tidak tahu persis balikan API-nya (apakah File .mp4 langsung atau JSON berisi link)
                // Kita buat handling dinamis.
                const contentType = response.headers.get("content-type");
                let videoUrl = "";

                if (contentType && contentType.includes("application/json")) {
                    const data = await response.json();
                    videoUrl = data.url || data.video_url || data.file; // Ambil property linknya
                } else {
                    // Kalau ternyata dia balikin raw file/buffer video langsung
                    const blob = await response.blob();
                    videoUrl = URL.createObjectURL(blob);
                }

                if (videoUrl) {
                    videoPlayer.src = videoUrl;
                    downloadBtn.href = videoUrl;
                    result.classList.remove('hidden');
                } else {
                    alert('Wah, video URL tidak ditemukan dari balikan API.');
                }

            } catch (error) {
                alert('Terjadi kesalahan! Pastikan target URL benar dan server API sedang aktif.\nDetail: ' + error.message);
            } finally {
                // Reset state
                btn.disabled = false;
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                btn.innerText = '🔴 Mulai Record';
                loading.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
