<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dezzify Terminal v2</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 10px;
        }

        .terminal-container {
            width: 100%;
            height: 100%;
            max-width: 600px;
            max-height: 800px;
            display: flex;
            flex-direction: column;
            border: 1px solid #222;
            background-color: #050505;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.02);
            border-radius: 4px;
        }

        .header {
            padding: 15px;
            border-bottom: 1px solid #222;
            text-align: center;
            font-size: 12px;
            letter-spacing: 3px;
            color: #666;
            text-transform: uppercase;
        }

        /* Form Input Section */
        .input-section {
            padding: 20px;
            border-bottom: 1px dashed #222;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        input[type="tel"] {
            background: transparent;
            border: 1px solid #333;
            padding: 12px;
            color: #fff;
            font-family: inherit;
            outline: none;
            text-align: center;
            font-size: 16px;
            transition: border 0.3s;
        }

        input[type="tel"]:focus {
            border-color: #fff;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }

        button:active {
            opacity: 0.8;
        }

        button:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }

        /* Output Terminal */
        .output {
            flex-grow: 1;
            padding: 20px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.6;
            color: #aaa;
        }

        .line { margin-bottom: 5px; }
        .success { color: #fff; font-weight: bold; }
        .warning { color: #888; }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: #222; }
    </style>
</head>
<body>

    <div class="terminal-container">
        <div class="header">DEZZIFY_SYSTEM_INIT</div>
        
        <div class="input-section" id="form-box">
            <input type="tel" id="target-phone" placeholder="MASUKKAN NOMOR TARGET..." autocomplete="off">
            <button id="start-btn">Jalankan Exploit</button>
        </div>

        <div class="output" id="output-box">
            <div class="line">Awaiting Target Input...</div>
        </div>
    </div>

    <script>
        const outputBox = document.getElementById('output-box');
        const startBtn = document.getElementById('start-btn');
        const phoneInput = document.getElementById('target-phone');

        function addLine(text, type = '') {
            const div = document.createElement('div');
            div.className = `line ${type}`;
            div.textContent = text;
            outputBox.appendChild(div);
            outputBox.scrollTop = outputBox.scrollHeight;
        }

        function generatePin() {
            return Math.floor(100000 + Math.random() * 900000);
        }

        startBtn.addEventListener('click', async () => {
            const phone = phoneInput.value;
            if (!phone) return alert('Masukkan nomor dulu!');

            // Lock UI
            startBtn.disabled = true;
            phoneInput.disabled = true;
            outputBox.innerHTML = '';

            const logs = [
                { t: `> Inisialisasi serangan ke: ${phone}`, s: 'warning', d: 800 },
                { t: "> Menghubungkan ke satelit proxy...", s: '', d: 1200 },
                { t: "[OK] Terhubung via Rotterdam_SRV-4", s: 'success', d: 500 },
                { t: "> Mencari celah database...", s: '', d: 1500 },
                { t: "> Menginjeksi payload .sh ke sistem...", s: '', d: 1000 },
                { t: "[!] Celah ditemukan: Port 8080 open", s: 'success', d: 700 },
                { t: "> Melakukan Brute Force pada PIN...", s: '', d: 2000 },
                { t: "> Bypass Otentikasi Dua Faktor...", s: '', d: 1500 },
                { t: "----------------------------------", s: 'warning', d: 200 },
                { t: "ACCESS GRANTED.", s: 'success', d: 400 },
                { t: `HASIL GENERATED PIN: ${generatePin()}`, s: 'success', d: 100 },
                { t: "----------------------------------", s: 'warning', d: 200 },
                { t: "> Menghapus jejak log sistem...", s: '', d: 1000 },
                { t: "Selesai.", s: 'warning', d: 0 }
            ];

            for (const log of logs) {
                await new Promise(r => setTimeout(r, log.d));
                addLine(log.t, log.s);
            }

            // Reset tombol setelah selesai (opsional)
            startBtn.disabled = false;
            phoneInput.disabled = false;
        });
    </script>
</body>
</html>
